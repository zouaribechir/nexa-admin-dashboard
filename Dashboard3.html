<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="نكسا أدمن — لوحة تحكم SaaS احترافية بالعربية مع مساعد ذكاء اصطناعي، لوح كانبان، وتحليلات متقدمة" />
<meta name="theme-color" content="#4F46E5" />
<title>نكسا أدمن — لوحة تحكم SaaS احترافية</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/ibm-plex-sans-arabic:400,500,600,700/arabic.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
/* ============================================================
   نكسا أدمن v3 — نظام التصميم (RTL)
   ============================================================ */
:root{
  --primary:#4F46E5; --primary-hover:#4338CA; --primary-soft:rgba(79,70,229,.12); --primary-rgb:79,70,229;
  --accent:#10B981; --accent-soft:rgba(16,185,129,.12);
  --danger:#EF4444; --danger-soft:rgba(239,68,68,.12);
  --warning:#F59E0B; --warning-soft:rgba(245,158,11,.12);
  --info:#3B82F6; --info-soft:rgba(59,130,246,.12);
  --purple:#8B5CF6; --purple-soft:rgba(139,92,246,.12);
  --rose:#F43F5E; --rose-soft:rgba(244,63,94,.12);

  --bg:#F7F8FC; --bg-elevated:#FFFFFF; --bg-subtle:#F1F3F9;
  --border:#E6E8F0; --border-strong:#D2D6E3;
  --text:#0F172A; --text-muted:#64748B; --text-subtle:#94A3B8;
  --glass:rgba(255,255,255,.72);

  --shadow-sm:0 1px 2px rgba(15,23,42,.05);
  --shadow:0 4px 14px rgba(15,23,42,.07);
  --shadow-lg:0 14px 44px rgba(15,23,42,.12);
  --shadow-xl:0 28px 70px rgba(15,23,42,.18);

  --r-sm:8px; --r:12px; --r-lg:16px; --r-xl:22px;
  --sidebar-w:268px; --sidebar-collapsed:82px; --header-h:68px;
  --tr:.22s cubic-bezier(.4,0,.2,1); --spring:.42s cubic-bezier(.34,1.56,.64,1);
}
[data-theme="dark"]{
  --bg:#0A0F1E; --bg-elevated:#0F1628; --bg-subtle:#1A2236;
  --border:#1E2740; --border-strong:#2C3654;
  --text:#F4F6FC; --text-muted:#9AA6C0; --text-subtle:#64708C;
  --glass:rgba(15,22,40,.72);
  --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow:0 4px 14px rgba(0,0,0,.45);
  --shadow-lg:0 14px 44px rgba(0,0,0,.55); --shadow-xl:0 28px 70px rgba(0,0,0,.65);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'IBM Plex Sans Arabic','Tajawal','Segoe UI',Tahoma,sans-serif;font-size:14px;line-height:1.6;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;transition:background var(--tr),color var(--tr)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;color:inherit}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--text-subtle)}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:6px}

/* ===== شريط التحميل العلوي ===== */
.topbar{position:fixed;top:0;inset-inline:0;height:3px;z-index:3000;pointer-events:none}
.topbar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--primary),var(--accent));opacity:0;transition:width .35s ease,opacity .3s ease;border-radius:0 3px 3px 0}
.topbar.loading .topbar-fill{width:72%;opacity:1}
.topbar.done .topbar-fill{width:100%;opacity:1}

/* ===== الهياكل (Skeletons) ===== */
.skeleton{background:linear-gradient(90deg,var(--bg-subtle) 25%,var(--border) 50%,var(--bg-subtle) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--r)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ===== ظهور البطاقات (Micro interaction) ===== */
.reveal{animation:cardIn .55s cubic-bezier(.2,.7,.2,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* ===== التوثيق ===== */
.auth-page{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:var(--bg)}
.auth-visual{position:relative;background:#0B1020;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;padding:46px;color:#fff}
.auth-visual::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 25% 30%,rgba(79,70,229,.55),transparent 52%),radial-gradient(circle at 80% 70%,rgba(16,185,129,.42),transparent 52%),radial-gradient(circle at 55% 50%,rgba(139,92,246,.32),transparent 60%);animation:grad 13s ease infinite}
@keyframes grad{0%,100%{transform:scale(1) rotate(0)}50%{transform:scale(1.12) rotate(3deg)}}
.auth-visual::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:42px 42px}
.auth-visual>*{position:relative;z-index:2}
.auth-brand{display:flex;align-items:center;gap:12px;font-size:20px;font-weight:700}
.brand-mark{width:40px;height:40px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:12px;display:grid;place-items:center;color:#fff;font-weight:800;box-shadow:0 8px 24px rgba(var(--primary-rgb),.45)}
.auth-quote{max-width:480px}
.auth-quote blockquote{font-size:28px;font-weight:500;line-height:1.45;margin-bottom:22px;letter-spacing:-.01em}
.auth-quote cite{font-style:normal;font-size:14px;opacity:.7}
.auth-stats{display:flex;gap:30px}
.auth-stat-num{font-size:26px;font-weight:700}
.auth-stat-label{font-size:12px;opacity:.6}
.auth-form-wrap{display:flex;align-items:center;justify-content:center;padding:46px;overflow-y:auto}
.auth-form{width:100%;max-width:420px}
.auth-form h1{font-size:29px;font-weight:700;letter-spacing:-.01em;margin-bottom:8px}
.auth-form .subtitle{color:var(--text-muted);margin-bottom:26px}
.social-login{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
.social-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border:1px solid var(--border);border-radius:var(--r);font-weight:500;background:var(--bg-elevated);transition:all var(--tr)}
.social-btn:hover{border-color:var(--border-strong);background:var(--bg-subtle);transform:translateY(-1px)}
.divider{display:flex;align-items:center;gap:14px;margin:22px 0;color:var(--text-subtle);font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.form-group{margin-bottom:15px}
.form-label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
.form-input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg-elevated);font-size:14px;transition:all var(--tr)}
.form-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
.form-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;font-size:13px}
.checkbox-wrap{display:flex;align-items:center;gap:8px;color:var(--text-muted);cursor:pointer}
.checkbox-wrap input{width:16px;height:16px;accent-color:var(--primary)}
.link-btn{color:var(--primary);font-weight:500;background:none;border:none;cursor:pointer;font-size:13px}
.link-btn:hover{text-decoration:underline}
.btn-primary{width:100%;padding:12px 20px;background:var(--primary);color:#fff;border-radius:var(--r);font-weight:600;font-size:14px;transition:all var(--tr);position:relative;overflow:hidden}
.btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px);box-shadow:0 8px 22px rgba(var(--primary-rgb),.32)}
.btn-primary.loading{pointer-events:none;opacity:.85}
.btn-primary .spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
.btn-primary.loading .btn-text{display:none}
.btn-primary.loading .spinner{display:inline-block}
.auth-footer{text-align:center;margin-top:22px;color:var(--text-muted);font-size:13px}

/* ===== التخطيط ===== */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
.app.sidebar-collapsed{grid-template-columns:var(--sidebar-collapsed) 1fr}
.sidebar{position:sticky;top:0;height:100vh;background:var(--bg-elevated);border-inline-end:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:100}
.sidebar-header{padding:0 20px;display:flex;align-items:center;gap:12px;border-block-end:1px solid var(--border);height:var(--header-h);flex-shrink:0}
.sidebar-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:11px;display:grid;place-items:center;color:#fff;font-weight:800;flex-shrink:0;box-shadow:0 4px 14px rgba(var(--primary-rgb),.35)}
.sidebar-title{font-weight:700;font-size:16px;white-space:nowrap;transition:opacity var(--tr)}
.sidebar-collapsed .sidebar-title,.sidebar-collapsed .nav-section-title,.sidebar-collapsed .nav-label,.sidebar-collapsed .nav-badge,.sidebar-collapsed .nav-caret,.sidebar-collapsed .user-info,.sidebar-collapsed .upgrade-card{opacity:0;width:0;overflow:hidden}
.sidebar-nav{flex:1;overflow-y:auto;padding:16px 12px}
.nav-section{margin-bottom:18px}
.nav-section-title{font-size:11px;font-weight:600;color:var(--text-subtle);padding:0 12px;margin-bottom:6px;white-space:nowrap}
.nav-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:var(--r);color:var(--text-muted);font-weight:500;font-size:13.5px;margin-bottom:2px;cursor:pointer;transition:all var(--tr);white-space:nowrap;position:relative;width:100%;text-align:start}
.nav-item:hover{background:var(--bg-subtle);color:var(--text)}
.nav-item.active{background:var(--primary-soft);color:var(--primary)}
.nav-item.active::before{content:'';position:absolute;inset-inline-start:-12px;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--primary);border-start-end-radius:3px;border-end-end-radius:3px}
.nav-item i.nav-icon{width:20px;text-align:center;font-size:15px;flex-shrink:0}
.nav-label{flex:1}
.nav-badge{padding:1px 8px;background:var(--primary);color:#fff;border-radius:10px;font-size:10px;font-weight:600}
.nav-badge.accent{background:var(--accent)}
.nav-badge.rose{background:var(--rose)}
.nav-caret{font-size:10px;transition:transform var(--tr);color:var(--text-subtle)}
.nav-group.open .nav-caret{transform:rotate(90deg)}
.nav-submenu{max-height:0;overflow:hidden;transition:max-height .3s ease}
.nav-group.open .nav-submenu{max-height:240px}
.nav-submenu .nav-item{padding-inline-start:44px;font-size:13px}
.sidebar-footer{padding:12px;border-block-start:1px solid var(--border);flex-shrink:0}
.upgrade-card{background:linear-gradient(135deg,var(--primary),var(--purple));border-radius:var(--r);padding:16px;color:#fff;margin-bottom:12px}
.upgrade-card-title{font-weight:600;font-size:13px;margin-bottom:4px}
.upgrade-card-desc{font-size:11px;opacity:.88;margin-bottom:10px}
.upgrade-card-btn{width:100%;padding:7px;background:#fff;color:var(--primary);border-radius:var(--r-sm);font-weight:600;font-size:12px}
.sidebar-user{display:flex;align-items:center;gap:12px;padding:8px;border-radius:var(--r);cursor:pointer;transition:background var(--tr)}
.sidebar-user:hover{background:var(--bg-subtle)}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:grid;place-items:center;color:#fff;font-weight:600;font-size:13px;flex-shrink:0;overflow:hidden}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.user-info{overflow:hidden}
.user-name{font-weight:600;font-size:13px;white-space:nowrap}
.user-email{font-size:11px;color:var(--text-subtle);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main{display:flex;flex-direction:column;min-width:0}
.header{position:sticky;top:0;height:var(--header-h);background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-block-end:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;z-index:50}
.header-toggle{width:36px;height:36px;border-radius:var(--r);display:grid;place-items:center;color:var(--text-muted);transition:all var(--tr)}
.header-toggle:hover{background:var(--bg-subtle);color:var(--text)}
.header-search{flex:1;max-width:440px}
.search-trigger{width:100%;display:flex;align-items:center;gap:10px;padding:9px 14px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg-elevated);color:var(--text-subtle);font-size:13px;transition:all var(--tr);text-align:start}
.search-trigger:hover{border-color:var(--border-strong)}
.search-trigger kbd{margin-inline-start:auto;padding:2px 7px;background:var(--bg-subtle);border-radius:5px;font-size:11px;font-family:inherit}
.header-actions{display:flex;align-items:center;gap:4px;margin-inline-start:auto}
.icon-btn{width:38px;height:38px;border-radius:var(--r);display:grid;place-items:center;color:var(--text-muted);position:relative;transition:all var(--tr)}
.icon-btn:hover{background:var(--bg-subtle);color:var(--text)}
.icon-btn .dot{position:absolute;top:8px;inset-inline-end:9px;min-width:16px;height:16px;padding:0 4px;background:var(--rose);color:#fff;border-radius:9px;border:2px solid var(--bg);font-size:9px;font-weight:700;display:grid;place-items:center}
.header-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border var(--tr);background:linear-gradient(135deg,var(--primary),var(--accent));display:grid;place-items:center;color:#fff;font-weight:600;font-size:12px}
.header-avatar:hover{border-color:var(--primary)}
.content{flex:1;padding:28px;animation:fadeIn .3s ease}
.app-footer{padding:18px 28px;border-block-start:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;color:var(--text-muted);font-size:12px;flex-wrap:wrap;gap:12px}
.app-footer a{color:var(--text-muted);transition:color var(--tr)}
.app-footer a:hover{color:var(--primary)}
.footer-links{display:flex;gap:18px}

/* ===== مكوّنات الصفحة ===== */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px;gap:16px;flex-wrap:wrap}
.page-title{font-size:26px;font-weight:700;letter-spacing:-.01em;margin-bottom:4px}
.page-subtitle{color:var(--text-muted);font-size:14px}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);margin-bottom:8px}
.breadcrumb a:hover{color:var(--primary)}
.breadcrumb .sep{color:var(--text-subtle)}
.breadcrumb .current{color:var(--text);font-weight:500}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:var(--r);font-weight:500;font-size:13px;transition:all var(--tr);white-space:nowrap;position:relative;overflow:hidden}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px);box-shadow:0 6px 18px rgba(var(--primary-rgb),.28)}
.btn-secondary{background:var(--bg-elevated);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg-subtle);border-color:var(--border-strong)}
.btn-ghost{color:var(--text-muted)}
.btn-ghost:hover{background:var(--bg-subtle);color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center}
.card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;transition:transform var(--tr),box-shadow var(--tr),border-color var(--tr)}
.card-hover:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--border-strong)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px}
.card-title{font-size:15px;font-weight:600}
.card-subtitle{font-size:12px;color:var(--text-muted);margin-top:2px}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:22px}
.stat-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;transition:transform var(--tr),box-shadow var(--tr);position:relative;overflow:hidden}
.stat-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.stat-card::after{content:'';position:absolute;top:-30px;inset-inline-end:-30px;width:110px;height:110px;background:radial-gradient(circle,var(--primary-soft),transparent 70%);opacity:0;transition:opacity var(--tr)}
.stat-card:hover::after{opacity:1}
.stat-label{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stat-label-text{font-size:13px;color:var(--text-muted);font-weight:500}
.stat-icon{width:40px;height:40px;border-radius:var(--r);display:grid;place-items:center;font-size:15px}
.stat-icon.primary{background:var(--primary-soft);color:var(--primary)}
.stat-icon.accent{background:var(--accent-soft);color:var(--accent)}
.stat-icon.warning{background:var(--warning-soft);color:var(--warning)}
.stat-icon.info{background:var(--info-soft);color:var(--info)}
.stat-icon.purple{background:var(--purple-soft);color:var(--purple)}
.stat-icon.rose{background:var(--rose-soft);color:var(--rose)}
.stat-value{font-size:29px;font-weight:700;letter-spacing:-.01em;margin-bottom:8px;line-height:1}
.stat-change{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px}
.stat-change.up{background:var(--accent-soft);color:var(--accent)}
.stat-change.down{background:var(--danger-soft);color:var(--danger)}

.grid-2{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:22px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:22px}
.grid-2-equal{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}
@media(max-width:1024px){.grid-2,.grid-2-equal,.grid-3{grid-template-columns:1fr}}

/* ===== الجداول المتقدمة ===== */
.table-wrap{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.table-toolbar{display:flex;align-items:center;gap:10px;padding:14px 18px;border-block-end:1px solid var(--border);flex-wrap:wrap}
.table-search{flex:1;min-width:180px;position:relative}
.table-search input{width:100%;padding:9px 12px 9px 12px;padding-inline-start:36px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);font-size:13px}
.table-search input:focus{outline:none;border-color:var(--primary)}
.table-search i{position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);color:var(--text-subtle);font-size:12px}
.table-scroll{overflow-x:auto;max-height:560px;overflow-y:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:13px 18px;text-align:start;border-block-end:1px solid var(--border);font-size:13px}
th{font-weight:600;color:var(--text-muted);font-size:11px;letter-spacing:.03em;background:var(--bg-subtle);position:sticky;top:0;z-index:2;white-space:nowrap}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--text)}
th .sort-icon{opacity:.3;margin-inline-start:4px;font-size:10px}
th.sorted .sort-icon{opacity:1;color:var(--primary)}
tbody tr{transition:background var(--tr)}
tbody tr:hover{background:var(--bg-subtle)}
tbody tr:last-child td{border-block-end:none}
tbody tr.selected{background:var(--primary-soft)}
.table-user{display:flex;align-items:center;gap:12px}
.table-user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:grid;place-items:center;color:#fff;font-weight:600;font-size:12px;flex-shrink:0;overflow:hidden}
.table-user-avatar img{width:100%;height:100%;object-fit:cover}
.table-user-name{font-weight:500}
.table-user-email{font-size:12px;color:var(--text-subtle)}
.bulk-bar{display:none;align-items:center;gap:12px;padding:10px 18px;background:var(--primary-soft);border-block-end:1px solid var(--border);font-size:13px}
.bulk-bar.show{display:flex;animation:fadeIn .2s ease}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-block-start:1px solid var(--border);flex-wrap:wrap;gap:12px}
.pagination-info{font-size:13px;color:var(--text-muted)}
.pagination-buttons{display:flex;gap:4px}
.page-btn{min-width:32px;height:32px;padding:0 10px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:var(--text-muted);transition:all var(--tr)}
.page-btn:hover{background:var(--bg-subtle);color:var(--text)}
.page-btn.active{background:var(--primary);color:#fff}
.page-btn:disabled{opacity:.4;cursor:not-allowed}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-success{background:var(--accent-soft);color:var(--accent)}
.badge-warning{background:var(--warning-soft);color:var(--warning)}
.badge-danger{background:var(--danger-soft);color:var(--danger)}
.badge-info{background:var(--info-soft);color:var(--info)}
.badge-primary{background:var(--primary-soft);color:var(--primary)}
.badge-purple{background:var(--purple-soft);color:var(--purple)}
.badge-rose{background:var(--rose-soft);color:var(--rose)}
.badge-neutral{background:var(--bg-subtle);color:var(--text-muted)}

.tabs{display:flex;gap:4px;border-block-end:1px solid var(--border);margin-bottom:22px;overflow-x:auto}
.tab{padding:11px 16px;font-weight:500;font-size:13px;color:var(--text-muted);border-block-end:2px solid transparent;margin-block-end:-1px;transition:all var(--tr);white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--primary);border-block-end-color:var(--primary)}

.timeline{position:relative;padding-inline-start:24px}
.timeline::before{content:'';position:absolute;inset-inline-start:8px;top:8px;bottom:8px;width:2px;background:var(--border)}
.timeline-item{position:relative;padding-block-end:18px}
.timeline-item:last-child{padding-block-end:0}
.timeline-dot{position:absolute;inset-inline-start:-20px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--primary);border:2px solid var(--bg-elevated);box-shadow:0 0 0 2px var(--primary-soft)}
.timeline-dot.success{background:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.timeline-dot.warning{background:var(--warning);box-shadow:0 0 0 2px var(--warning-soft)}
.timeline-dot.info{background:var(--info);box-shadow:0 0 0 2px var(--info-soft)}
.timeline-content{background:var(--bg-subtle);padding:11px 14px;border-radius:var(--r);font-size:13px}
.timeline-time{font-size:11px;color:var(--text-subtle);margin-top:4px}

/* ===== الإشعارات (Toast) ===== */
.toast-container{position:fixed;top:20px;inset-inline-end:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:12px;min-width:280px;animation:toastIn .35s var(--spring)}
@keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-icon{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-size:13px;flex-shrink:0}
.toast-icon.success{background:var(--accent-soft);color:var(--accent)}
.toast-icon.error{background:var(--danger-soft);color:var(--danger)}
.toast-icon.info{background:var(--info-soft);color:var(--info)}
.toast-text{font-size:13px;font-weight:500}

/* ===== القوائم المنسدلة ===== */
.dropdown{position:relative}
.dropdown-menu{position:absolute;top:calc(100% + 8px);inset-inline-end:0;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-lg);min-width:200px;padding:6px;z-index:200;display:none}
.dropdown-menu.show{display:block;animation:dropIn .15s ease}
@keyframes dropIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);font-size:13px;cursor:pointer;transition:background var(--tr);width:100%;text-align:start}
.dropdown-item:hover{background:var(--bg-subtle)}
.dropdown-item.danger{color:var(--danger)}
.dropdown-item i{width:16px;text-align:center;color:var(--text-muted)}
.dropdown-item.danger i{color:var(--danger)}
.dropdown-divider{height:1px;background:var(--border);margin:6px 0}
.dropdown-header{padding:8px 12px 4px;font-size:11px;font-weight:600;color:var(--text-subtle)}
.notif-dropdown{width:360px;padding:0}
.notif-dropdown-header{padding:14px 16px;border-block-end:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notif-list{max-height:380px;overflow-y:auto}
.notif-item{padding:13px 16px;border-block-end:1px solid var(--border);display:flex;gap:12px;cursor:pointer;transition:background var(--tr)}
.notif-item:hover{background:var(--bg-subtle)}
.notif-item.unread{background:var(--primary-soft)}
.notif-item:last-child{border-block-end:none}

/* ===== المودال والدرج ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);display:grid;place-items:center;z-index:1000;animation:fadeIn .2s ease;padding:24px}
.modal{background:var(--bg-elevated);border-radius:var(--r-xl);max-width:500px;width:100%;max-height:90vh;overflow-y:auto;animation:scaleIn .25s var(--spring)}
@keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal-header{padding:20px 24px;border-block-end:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:600}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-block-start:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.drawer-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:1000;animation:fadeIn .2s ease}
.drawer{position:fixed;top:0;inset-inline-end:0;bottom:0;width:430px;max-width:92vw;background:var(--bg-elevated);border-inline-start:1px solid var(--border);z-index:1001;animation:drawerIn .3s var(--spring);overflow-y:auto}
@keyframes drawerIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
[dir="rtl"] .drawer{animation-name:drawerInRtl}
@keyframes drawerInRtl{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.drawer-header{padding:20px 24px;border-block-end:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg-elevated);z-index:2}
.drawer-body{padding:24px}

.progress{height:6px;background:var(--bg-subtle);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:var(--primary);border-radius:3px;width:0;transition:width 1s cubic-bezier(.4,0,.2,1)}

/* ===== التقويم ===== */
.calendar{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px}
.calendar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.calendar-title{font-size:17px;font-weight:600}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.calendar-day-name{text-align:center;font-size:11px;font-weight:600;color:var(--text-subtle);padding:8px 0}
.calendar-day{aspect-ratio:1;display:grid;place-items:center;border-radius:var(--r);font-size:13px;cursor:pointer;transition:all var(--tr);position:relative}
.calendar-day:hover{background:var(--bg-subtle)}
.calendar-day.other-month{color:var(--text-subtle);opacity:.45}
.calendar-day.today{background:var(--primary);color:#fff;font-weight:600}
.calendar-day.has-event::after{content:'';position:absolute;bottom:6px;width:4px;height:4px;background:var(--accent);border-radius:50%}

/* ===== المحادثة ===== */
.chat-layout{display:grid;grid-template-columns:320px 1fr;gap:18px;height:calc(100vh - var(--header-h) - 140px);min-height:500px}
.chat-list{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;display:flex;flex-direction:column}
.chat-list-header{padding:14px;border-block-end:1px solid var(--border)}
.chat-list-search{padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);font-size:13px;width:100%}
.chat-items{flex:1;overflow-y:auto}
.chat-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-block-end:1px solid var(--border);cursor:pointer;transition:background var(--tr)}
.chat-item:hover{background:var(--bg-subtle)}
.chat-item.active{background:var(--primary-soft)}
.chat-item.pinned{border-inline-start:2px solid var(--warning)}
.chat-item-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:grid;place-items:center;color:#fff;font-weight:600;flex-shrink:0;position:relative}
.chat-item-avatar .online{position:absolute;bottom:1px;inset-inline-end:1px;width:11px;height:11px;background:var(--accent);border-radius:50%;border:2px solid var(--bg-elevated)}
.chat-item-content{flex:1;min-width:0}
.chat-item-name{font-weight:600;font-size:13px;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.chat-item-msg{font-size:12px;color:var(--text-subtle);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-item-meta{text-align:end;flex-shrink:0}
.chat-item-time{font-size:11px;color:var(--text-subtle)}
.chat-item-unread{margin-top:4px;background:var(--primary);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:600;display:inline-block}
.pin-icon{color:var(--warning);font-size:10px}
.chat-main{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-lg);display:flex;flex-direction:column;overflow:hidden}
.chat-main-header{padding:14px 20px;border-block-end:1px solid var(--border);display:flex;align-items:center;gap:12px}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.message{display:flex;gap:12px;max-width:72%;animation:cardIn .3s ease}
.message.sent{align-self:flex-end;flex-direction:row-reverse}
.message-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:grid;place-items:center;color:#fff;font-weight:600;font-size:12px;flex-shrink:0}
.message-bubble{background:var(--bg-subtle);padding:11px 15px;border-radius:var(--r-lg);font-size:13px;line-height:1.6}
.message.sent .message-bubble{background:var(--primary);color:#fff}
.message-time{font-size:11px;color:var(--text-subtle);margin-top:4px}
.chat-input{padding:14px 20px;border-block-start:1px solid var(--border);display:flex;gap:10px;align-items:center}
.chat-input input{flex:1;padding:11px 16px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);font-size:13px}
.chat-input input:focus{outline:none;border-color:var(--primary)}

/* ===== مدير الملفات ===== */
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:14px}
.file-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all var(--tr)}
.file-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--primary)}
.file-icon{width:46px;height:46px;border-radius:var(--r);display:grid;place-items:center;font-size:19px;margin-bottom:12px}
.file-icon.folder{background:var(--warning-soft);color:var(--warning)}
.file-icon.image{background:var(--accent-soft);color:var(--accent)}
.file-icon.doc{background:var(--info-soft);color:var(--info)}
.file-icon.pdf{background:var(--danger-soft);color:var(--danger)}
.file-name{font-size:13px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:11px;color:var(--text-subtle)}

/* ===== الأسعار ===== */
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:38px}
@media(max-width:900px){.pricing-grid{grid-template-columns:1fr}}
.pricing-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-xl);padding:30px;position:relative;transition:all var(--tr)}
.pricing-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.pricing-card.featured{border-color:var(--primary);box-shadow:0 14px 44px rgba(var(--primary-rgb),.18)}
.pricing-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;padding:4px 16px;border-radius:20px;font-size:11px;font-weight:600}
.pricing-name{font-size:14px;font-weight:600;color:var(--text-muted);margin-bottom:8px}
.pricing-price{font-size:44px;font-weight:700;letter-spacing:-.01em;margin-bottom:4px}
.pricing-price span{font-size:15px;color:var(--text-muted);font-weight:500}
.pricing-desc{font-size:13px;color:var(--text-muted);margin-bottom:22px}
.pricing-features{list-style:none;margin-bottom:22px}
.pricing-features li{padding:7px 0;font-size:13px;display:flex;align-items:center;gap:10px}
.pricing-features li i{color:var(--accent);font-size:12px}

/* ===== المنتجات ===== */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
.product-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:all var(--tr);cursor:pointer}
.product-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.product-image{aspect-ratio:1;background:var(--bg-subtle);display:grid;place-items:center;overflow:hidden}
.product-image img{width:100%;height:100%;object-fit:cover;transition:transform .45s ease}
.product-card:hover .product-image img{transform:scale(1.06)}
.product-info{padding:16px}
.product-category{font-size:11px;color:var(--text-subtle);margin-bottom:4px}
.product-name{font-weight:600;font-size:14px;margin-bottom:8px}
.product-meta{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-muted)}
.product-price{font-weight:700;color:var(--text);font-size:16px}

/* ===== البروفايل ===== */
.profile-header{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-xl);overflow:hidden;margin-bottom:22px}
.profile-cover{height:180px;background:linear-gradient(135deg,var(--primary),var(--purple),var(--accent));position:relative}
.profile-info{padding:0 28px 28px;display:flex;align-items:flex-end;gap:20px;margin-top:-56px;position:relative;flex-wrap:wrap}
.profile-avatar{width:112px;height:112px;border-radius:50%;border:4px solid var(--bg-elevated);overflow:hidden;background:linear-gradient(135deg,var(--primary),var(--accent));display:grid;place-items:center;color:#fff;font-size:36px;font-weight:700;flex-shrink:0}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-details{flex:1;min-width:200px;padding-block-end:6px}
.profile-name{font-size:23px;font-weight:700}
.profile-role{color:var(--text-muted);font-size:14px;margin-top:4px}

/* ===== FAQ ===== */
.faq-item{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.faq-question{padding:17px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-weight:500;transition:background var(--tr)}
.faq-question:hover{background:var(--bg-subtle)}
.faq-question i{transition:transform var(--tr)}
.faq-item.open .faq-question i{transform:rotate(180deg)}
.faq-answer{max-height:0;overflow:hidden;transition:max-height .3s ease;padding:0 20px}
.faq-item.open .faq-answer{max-height:240px;padding:0 20px 18px}
.faq-answer p{color:var(--text-muted);font-size:13px;line-height:1.7}

/* ===== صفحات الخطأ ===== */
.error-page{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center;position:relative;overflow:hidden}
.error-page::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,var(--primary-soft),transparent 60%)}
.error-content{max-width:520px;position:relative;z-index:2}
.error-img{width:100%;max-width:360px;margin:0 auto 12px;animation:float 3.5s ease-in-out infinite}
.error-illustration{font-size:84px;margin-bottom:18px;color:var(--primary);animation:float 3.5s ease-in-out infinite}
.error-code{font-size:92px;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:8px}
.error-title{font-size:24px;font-weight:700;margin-bottom:12px}
.error-desc{color:var(--text-muted);margin-bottom:28px;line-height:1.7}

/* ===== كانبان ===== */
.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start}
@media(max-width:1100px){.kanban-board{grid-template-columns:repeat(2,minmax(260px,1fr))}}
@media(max-width:640px){.kanban-board{grid-template-columns:1fr}}
.kanban-column{background:var(--bg-subtle);border-radius:var(--r-lg);padding:12px;min-height:200px;transition:outline-color var(--tr)}
.kanban-column.drag-over{outline:2px dashed var(--primary);outline-offset:-4px}
.kanban-column-header{display:flex;align-items:center;justify-content:space-between;padding:6px 8px 12px}
.kanban-column-title{display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px}
.kanban-column-dot{width:8px;height:8px;border-radius:50%}
.kanban-count{background:var(--bg-elevated);padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600;color:var(--text-muted)}
.kanban-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;cursor:grab;transition:all var(--tr)}
.kanban-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.kanban-card.dragging{opacity:.45;cursor:grabbing}
.kanban-card-tags{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.kanban-card-title{font-weight:600;font-size:13px;margin-bottom:6px}
.kanban-card-desc{font-size:12px;color:var(--text-muted);margin-bottom:12px;line-height:1.6}
.kanban-card-footer{display:flex;align-items:center;justify-content:space-between}
.kanban-avatars{display:flex}
.kanban-avatars .table-user-avatar{width:26px;height:26px;font-size:10px;border:2px solid var(--bg-elevated);margin-inline-start:-8px}
.kanban-avatars .table-user-avatar:first-child{margin-inline-start:0}
.kanban-card-meta{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--text-subtle)}

/* ===== مساعد الذكاء الاصطناعي ===== */
.ai-fab{position:fixed;bottom:24px;inset-inline-end:24px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;display:grid;place-items:center;font-size:22px;box-shadow:0 8px 26px rgba(var(--primary-rgb),.45);z-index:900;transition:all var(--tr);animation:pulse 2.6s infinite}
.ai-fab:hover{transform:scale(1.08)}
@keyframes pulse{0%{box-shadow:0 8px 26px rgba(var(--primary-rgb),.45),0 0 0 0 rgba(var(--primary-rgb),.4)}70%{box-shadow:0 8px 26px rgba(var(--primary-rgb),.45),0 0 0 16px rgba(var(--primary-rgb),0)}100%{box-shadow:0 8px 26px rgba(var(--primary-rgb),.45),0 0 0 0 rgba(var(--primary-rgb),0)}}
.ai-panel{position:fixed;bottom:24px;inset-inline-end:24px;width:680px;max-width:calc(100vw - 32px);height:600px;max-height:calc(100vh - 48px);background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-xl);z-index:950;display:none;overflow:hidden}
.ai-panel.show{display:flex;animation:aiIn .3s var(--spring)}
@keyframes aiIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}
.ai-side{width:210px;border-inline-end:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg-subtle)}
.ai-side-head{padding:14px;border-block-end:1px solid var(--border)}
.ai-side-title{font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:10px}
.ai-new-btn{width:100%;padding:9px;background:var(--primary);color:#fff;border-radius:var(--r);font-weight:600;font-size:12px;display:flex;align-items:center;justify-content:center;gap:6px}
.ai-conv-list{flex:1;overflow-y:auto;padding:8px}
.ai-conv{padding:10px 12px;border-radius:var(--r);cursor:pointer;font-size:12.5px;margin-bottom:3px;transition:background var(--tr);display:flex;align-items:center;gap:8px;color:var(--text-muted)}
.ai-conv:hover{background:var(--bg-elevated);color:var(--text)}
.ai-conv.active{background:var(--bg-elevated);color:var(--primary);font-weight:600}
.ai-conv i{font-size:11px}
.ai-main{flex:1;display:flex;flex-direction:column;min-width:0}
.ai-header{padding:14px 18px;background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;display:flex;align-items:center;gap:12px}
.ai-header-avatar{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:18px}
.ai-header-info{flex:1}
.ai-header-title{font-weight:600;font-size:14px}
.ai-header-status{font-size:11px;opacity:.9;display:flex;align-items:center;gap:5px}
.ai-header-status::before{content:'';width:6px;height:6px;background:#4ADE80;border-radius:50%}
.ai-messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}

function showToast(message,type='success'){
  const c=$('#toast-container');const t=document.createElement('div');t.className='toast';
  const icons={success:'fa-check',error:'fa-times',info:'fa-info'};
  t.innerHTML=`<div class="toast-icon ${type}"><i class="fas ${icons[type]}"></i></div><div class="toast-text">${message}</div>`;
  c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(120%)';setTimeout(()=>t.remove(),300);},3000);
}
function createRipple(e){
  const btn=e.currentTarget;const circle=document.createElement('span');
  const d=Math.max(btn.clientWidth,btn.clientHeight);const rect=btn.getBoundingClientRect();
  circle.style.width=circle.style.height=d+'px';
  circle.style.left=(e.clientX-rect.left-d/2)+'px';circle.style.top=(e.clientY-rect.top-d/2)+'px';
  circle.classList.add('ripple');btn.querySelectorAll('.ripple').forEach(r=>r.remove());btn.appendChild(circle);setTimeout(()=>circle.remove(),600);
}
function animateCounters(){
  $$('[data-count]').forEach(el=>{
    const target=parseFloat(el.dataset.count);const pre=el.dataset.prefix||'';const suf=el.dataset.suffix||'';
    const dec=el.dataset.decimals?parseInt(el.dataset.decimals):0;const dur=1300;const start=performance.now();
    function step(now){const p=Math.min((now-start)/dur,1);const e=1-Math.pow(1-p,3);const v=target*e;
      el.textContent=pre+(dec?v.toFixed(dec):Math.floor(v).toLocaleString('en-US'))+suf;
      if(p<1)requestAnimationFrame(step);else el.textContent=pre+(dec?target.toFixed(dec):target.toLocaleString('en-US'))+suf;}
    requestAnimationFrame(step);
  });
}

class DataTable{
  constructor(id,opts){
    this.id=id;this.cols=opts.columns;this.rows=opts.rows;this.pageSize=opts.pageSize||10;this.selectable=opts.selectable;
    this.st={q:'',sortKey:null,sortDir:1,page:1,filters:{},sel:new Set()};
    this.rows.forEach(r=>{r._search=this.cols.map(c=>strip(c.render?c.render(r):(r[c.key]??''))).join(' ').toLowerCase();});
    this.mount();
  }
  mount(){const el=$('#'+this.id);if(!el)return;el.innerHTML=this.shell();this.bind();this.draw();}
  shell(){
    const filterCols=this.cols.filter(c=>c.filter);
    const filters=filterCols.map(c=>{
      const vals=[...new Set(this.rows.map(r=>r[c.key]))];
      const opts=vals.map(v=>`<option value="${v}">${c.filterLabel?c.filterLabel(v):v}</option>`).join('');
      return `<select class="form-input dt-filter" data-key="${c.key}" style="width:auto"><option value="">كل ${c.label}</option>${opts}</select>`;
    }).join('');
    const ths=(this.selectable?`<th style="width:42px"><input type="checkbox" class="dt-all" style="accent-color:var(--primary)"/></th>`:'')+
      this.cols.map(c=>`<th class="${c.sortable===false?'':'sortable'}" ${c.sortable===false?'':`data-key="${c.key}"`}>${c.label}${c.sortable===false?'':'<i class="fas fa-sort sort-icon"></i>'}</th>`).join('');
    return `<div class="table-wrap">
      <div class="table-toolbar">
        <div class="table-search"><i class="fas fa-search"></i><input type="text" class="dt-q" placeholder="ابحث في الجدول..."/></div>
        ${filters}
        <button class="btn btn-secondary btn-sm dt-export"><i class="fas fa-file-csv"></i> تصدير</button>
      </div>
      <div class="bulk-bar dt-bulk"><span class="font-medium"><span class="dt-bulk-count">0</span> محدد</span>
        <button class="btn btn-sm btn-secondary dt-bulk-export"><i class="fas fa-download"></i> تصدير المحدد</button>
        <button class="btn btn-sm btn-danger dt-bulk-del"><i class="fas fa-trash"></i> حذف</button>
        <button class="btn btn-sm btn-ghost dt-bulk-clear" style="margin-inline-start:auto">إلغاء التحديد</button>
      </div>
      <div class="table-scroll"><table><thead><tr>${ths}</tr></thead><tbody class="dt-body"></tbody></table></div>
      <div class="pagination"><div class="pagination-info dt-info"></div><div class="pagination-buttons dt-pages"></div></div>
    </div>`;
  }
  bind(){
    const el=$('#'+this.id);
    el.querySelector('.dt-q').addEventListener('input',e=>{this.st.q=e.target.value.toLowerCase();this.st.page=1;this.draw();});
    el.querySelectorAll('.dt-filter').forEach(s=>s.addEventListener('change',e=>{this.st.filters[e.target.dataset.key]=e.target.value;this.st.page=1;this.draw();}));
    el.querySelectorAll('th.sortable').forEach(th=>th.addEventListener('click',()=>{const k=th.dataset.key;if(this.st.sortKey===k)this.st.sortDir*=-1;else{this.st.sortKey=k;this.st.sortDir=1;}this.draw();}));
    el.querySelector('.dt-export').addEventListener('click',()=>showToast('تم تصدير البيانات CSV','success'));
    el.querySelector('.dt-bulk-export').addEventListener('click',()=>showToast('تم تصدير المحدد','success'));
    el.querySelector('.dt-bulk-del').addEventListener('click',()=>showToast('تم حذف المحدد','error'));
    el.querySelector('.dt-bulk-clear').addEventListener('click',()=>{this.st.sel.clear();this.draw();});
    const all=el.querySelector('.dt-all');if(all)all.addEventListener('change',e=>{this.pageIds().forEach(id=>{if(e.target.checked)this.st.sel.add(id);else this.st.sel.delete(id);});this.draw();});
    el.addEventListener('click',e=>{const cb=e.target.closest('.dt-row-check');if(cb){const id=+cb.dataset.id;if(cb.checked)this.st.sel.add(id);else this.st.sel.delete(id);this.draw();return;}const pg=e.target.closest('.dt-page');if(pg&&!pg.disabled){this.st.page=+pg.dataset.p;this.draw();}});
  }
  pageIds(){return this.filtered().slice((this.st.page-1)*this.pageSize,this.st.page*this.pageSize).map(r=>r.id);}
  filtered(){
    let r=this.rows.filter(row=>(!this.st.q||row._search.includes(this.st.q))&&Object.entries(this.st.filters).every(([k,v])=>!v||String(row[k])===v));
    if(this.st.sortKey){const k=this.st.sortKey;const col=this.cols.find(c=>c.key===k);r=[...r].sort((a,b)=>{let av=col.sortValue?col.sortValue(a):a[k];let bv=col.sortValue?col.sortValue(b):b[k];if(typeof av==='string'){av=av.toLowerCase();bv=(bv||'').toLowerCase();}return av<bv?-1*this.st.sortDir:av>bv?1*this.st.sortDir:0;});}
    return r;
  }
  draw(){
    const el=$('#'+this.id);const f=this.filtered();const total=f.length;const pages=Math.max(1,Math.ceil(total/this.pageSize));
    if(this.st.page>pages)this.st.page=pages;const start=(this.st.page-1)*this.pageSize;const slice=f.slice(start,start+this.pageSize);
    el.querySelector('.dt-body').innerHTML=slice.length?slice.map(r=>{
      const sel=this.st.sel.has(r.id);
      const tds=(this.selectable?`<td><input type="checkbox" class="dt-row-check" data-id="${r.id}" ${sel?'checked':''} style="accent-color:var(--primary)"/></td>`:'')+
        this.cols.map(c=>`<td>${c.render?c.render(r):(r[c.key]??'')}</td>`).join('');
      return `<tr class="${sel?'selected':''}">${tds}</tr>`;
    }).join(''):`<tr><td colspan="${this.cols.length+(this.selectable?1:0)}" style="text-align:center;padding:40px;color:var(--text-muted)">لا توجد نتائج مطابقة</td></tr>`;
    el.querySelector('.dt-info').textContent=total?`عرض ${start+1} إلى ${Math.min(start+this.pageSize,total)} من ${fmtN(total)}`:'لا توجد سجلات';
    // pagination buttons
    let btns=`<button class="page-btn dt-page" data-p="${this.st.page-1}" ${this.st.page===1?'disabled':''}><i class="fas fa-chevron-right"></i></button>`;
    const win=[];for(let i=1;i<=pages;i++){if(i===1||i===pages||Math.abs(i-this.st.page)<=1)win.push(i);else if(win[win.length-1]!=='…')win.push('…');}
    win.forEach(i=>btns+=i==='…'?`<button class="page-btn" disabled>…</button>`:`<button class="page-btn dt-page ${i===this.st.page?'active':''}" data-p="${i}">${i}</button>`);
    btns+=`<button class="page-btn dt-page" data-p="${this.st.page+1}" ${this.st.page===pages?'disabled':''}><i class="fas fa-chevron-left"></i></button>`;
    el.querySelector('.dt-pages').innerHTML=btns;
    // sort icons
    el.querySelectorAll('th.sortable').forEach(th=>{th.classList.toggle('sorted',th.dataset.key===this.st.sortKey);const ic=th.querySelector('.sort-icon');if(ic)ic.className='fas sort-icon '+(th.dataset.key===this.st.sortKey?(this.st.sortDir===1?'fa-sort-up':'fa-sort-down'):'fa-sort');});
    // bulk
    const bulk=el.querySelector('.dt-bulk');if(bulk){bulk.classList.toggle('show',this.st.sel.size>0);el.querySelector('.dt-bulk-count').textContent=this.st.sel.size;}
    const all=el.querySelector('.dt-all');if(all){const ids=this.pageIds();all.checked=ids.length>0&&ids.every(id=>this.st.sel.has(id));}
  }
}

function buildTables(route){
  if(route==='customers'){
    new DataTable('dt-customers',{pageSize:10,selectable:true,rows:customers,columns:[
      {key:'name',label:'العميل',render:r=>userCell(r.name,r.email),sortValue:r=>r.name},
      {key:'city',label:'المدينة',render:r=>r.flag+' '+r.city,sortValue:r=>r.city},
      {key:'status',label:'الحالة',filter:true,filterLabel:statusLabel,render:r=>statusBadge(r.status)},
      {key:'orders',label:'الطلبات',render:r=>r.orders,sortValue:r=>r.orders},
      {key:'revenue',label:'الإيرادات',render:r=>'<strong>'+fmt(r.revenue)+'</strong>',sortValue:r=>r.revenue},
      {key:'joined',label:'الانضمام',render:r=>'<span class="text-muted">'+r.joinedStr+'</span>',sortValue:r=>r.joined},
      {key:'actions',label:'',sortable:false,render:r=>rowActions('openDrawer('+r.id+')')}
    ]});
  }
  if(route==='users'){
    new DataTable('dt-users',{pageSize:10,selectable:true,rows:users,columns:[
      {key:'name',label:'المستخدم',render:r=>userCell(r.name,r.email),sortValue:r=>r.name},
      {key:'role',label:'الدور',filter:true,render:r=>`<span class="badge badge-primary">${r.role}</span>`,sortValue:r=>r.role},
      {key:'status',label:'الحالة',filter:true,filterLabel:statusLabel,render:r=>statusBadge(r.status)},
      {key:'city',label:'المدينة',render:r=>r.flag+' '+r.city,sortValue:r=>r.city},
      {key:'phone',label:'الهاتف',render:r=>'<span class="text-muted">'+r.phone+'</span>'},
      {key:'joined',label:'الانضمام',render:r=>'<span class="text-muted">'+r.joinedStr+'</span>',sortValue:r=>r.joined},
      {key:'actions',label:'',sortable:false,render:()=>rowActions()}
    ]});
  }
  if(route==='products'){
    new DataTable('dt-products',{pageSize:8,rows:products,columns:[
      {key:'name',label:'المنتج',render:r=>`<div class="table-user"><div class="table-user-avatar" style="background:var(--bg-subtle)">${r.image?`<img src="${r.image}" alt="" loading="lazy"/>`:'<i class="fas fa-box" style="color:var(--text-subtle)"></i>'}</div><div><div class="table-user-name">${r.name}</div><div class="table-user-email">ID: ${String(r.id).padStart(4,'0')}</div></div></div>`,sortValue:r=>r.name},
      {key:'category',label:'الفئة',filter:true,render:r=>`<span class="badge badge-neutral">${r.category}</span>`},
      {key:'price',label:'السعر',render:r=>'<strong>'+fmt(r.price)+'</strong>',sortValue:r=>r.price},
      {key:'stock',label:'المخزون',render:r=>r.stock+' قطعة',sortValue:r=>r.stock},
      {key:'rating',label:'التقييم',render:r=>'<i class="fas fa-star" style="color:var(--warning);font-size:11px"></i> '+r.rating,sortValue:r=>r.rating},
      {key:'sales',label:'المبيعات',render:r=>fmtN(r.sales),sortValue:r=>r.sales},
      {key:'status',label:'الحالة',filter:true,filterLabel:statusLabel,render:r=>statusBadge(r.status)},
      {key:'actions',label:'',sortable:false,render:()=>`<button class="btn btn-ghost btn-icon btn-sm" onclick="navigate('product-details')"><i class="fas fa-eye"></i></button><button class="btn btn-ghost btn-icon btn-sm" onclick="showModal('product')"><i class="fas fa-edit"></i></button><button class="btn btn-ghost btn-icon btn-sm" style="color:var(--danger)" onclick="showModal('delete')"><i class="fas fa-trash"></i></button>`}
    ]});
  }
  if(route==='orders'){
    new DataTable('dt-orders',{pageSize:8,rows:orders,columns:[
      {key:'id',label:'رقم الطلب',render:r=>'<strong>'+r.id+'</strong>'},
      {key:'customer',label:'العميل',render:r=>r.customer,sortValue:r=>r.customer},
      {key:'date',label:'التاريخ',render:r=>'<span class="text-muted">'+r.date+'</span>',sortValue:r=>r.dateTs},
      {key:'amount',label:'المبلغ',render:r=>'<strong>'+fmt(r.amount)+'</strong>',sortValue:r=>r.amount},
      {key:'payment',label:'الدفع',render:r=>'<span class="text-muted">'+r.payment+'</span>'},
      {key:'status',label:'الحالة',filter:true,filterLabel:statusLabel,render:r=>statusBadge(r.status)},
      {key:'actions',label:'',sortable:false,render:r=>`<button class="btn btn-ghost btn-icon btn-sm" onclick="openOrderDrawer('${r.id}')"><i class="fas fa-eye"></i></button>`}
    ]});
  }
  if(route==='invoices'){
    new DataTable('dt-invoices',{pageSize:8,rows:invoices,columns:[

function toggleLive(){

  if(state.liveMode){btn.classList.remove('btn-secondary');btn.classList.add('btn-primary');btn.innerHTML='<i class="fas fa-circle" style="font-size:8px;color:#f87171;animation:pulse 1s infinite"></i> مباشر';showToast('الوضع المباشر مفعّل','info');

      'منتجات':"🏆 أفضل المنتجات أداءً هذا الشهر:\n1. سماعات Nimbus اللاسلكية — 3,891 مبيعة\n2. سماعات Aura Pro — 2,847 مبيعة\n3. لوحة مفاتيح Terra — 2,134 مبيعة\n\nتنبيه: شاشة Prism 4K مخزونها منخفض (18 قطعة).",
      'بريد':"✉️ مسودة بريد متابعة:\n\n\"مرحباً سارة، شكراً لطلبك الأخير #NX-9000! نأمل أن تستمتعي بتجربتك. كعميلة قيّمة، إليك خصم 15% على طلبك القادم بكود THANKYOU15...\""
    };
    const key=Object.keys(R).find(k=>t.includes(k))||'تقرير';
    conv.messages.push({role:'ai',text:R[key]});typing.remove();renderAIMessages();
  },1200);
}

// ---------- لوحة الأوامر ----------

  {g:'الصفحات',i:'fa-house',l:'الذهاب إلى لوحة التحكم',h:'G ثم D',a:()=>navigate('dashboard')},
  {g:'الصفحات',i:'fa-chart-line',l:'الذهاب إلى التحليلات',a:()=>navigate('analytics')},
  {g:'الصفحات',i:'fa-users',l:'الذهاب إلى العملاء',a:()=>navigate('customers')},
  {g:'الصفحات',i:'fa-box',l:'الذهاب إلى المنتجات',a:()=>navigate('products')},
  {g:'الصفحات',i:'fa-bag-shopping',l:'الذهاب إلى الطلبات',a:()=>navigate('orders')},
  {g:'الصفحات',i:'fa-table-columns',l:'الذهاب إلى لوحة المشاريع',a:()=>navigate('kanban')},
  {g:'الصفحات',i:'fa-calendar',l:'الذهاب إلى التقويم',a:()=>navigate('calendar')},
  {g:'الصفحات',i:'fa-gear',l:'الذهاب إلى الإعدادات',a:()=>navigate('settings')},
  {g:'إجراءات',i:'fa-user-plus',l:'دعوة عضو للفريق',a:()=>showModal('invite')},
  {g:'إجراءات',i:'fa-plus',l:'إنشاء منتج جديد',a:()=>showModal('product')},
  {g:'إجراءات',i:'fa-robot',l:'فتح المساعد الذكي',a:()=>toggleAI()},
  {g:'إجراءات',i:'fa-moon',l:'تبديل الوضع الداكن',a:()=>toggleTheme()},
  {g:'إجراءات',i:'fa-palette',l:'تغيير اللون المميّز',a:()=>{navigate('settings');setTimeout(()=>showSettingsTab('appearance',$('[data-tab="appearance"]')),350);}},
  {g:'إجراءات',i:'fa-download',l:'تصدير البيانات CSV',a:()=>showToast('تم تصدير البيانات','success')},
  {g:'اختبار',i:'fa-triangle-exclamation',l:'عرض صفحة 404',a:()=>navigate('404')},
  {g:'اختبار',i:'fa-lock',l:'عرض صفحة 401',a:()=>navigate('401')},
  {g:'اختبار',i:'fa-shield-halved',l:'عرض صفحة 403',a:()=>navigate('403')},
  {g:'اختبار',i:'fa-server',l:'عرض صفحة 500',a:()=>navigate('500')},
  {g:'أشخاص',i:'fa-user',l:'سارة المطيري',h:'عميلة',a:()=>openDrawer(1)},
  {g:'أشخاص',i:'fa-user',l:'ماجد الدوسري',h:'عميل',a:()=>openDrawer(4)}
];
function openCmd(){$('#cmd-overlay').classList.add('show');$('#cmd-input').value='';state.cmdIndex=0;renderCmd('');setTimeout(()=>$('#cmd-input').focus(),50);}
function closeCmd(){$('#cmd-overlay').classList.remove('show');}
function renderCmd(q){
  const r=$('#cmd-results');const f=CMD.filter(c=>c.l.toLowerCase().includes(q.toLowerCase()));
  if(!f.length){r.innerHTML=`<div class="cmd-empty"><i class="fas fa-search" style="font-size:24px;margin-bottom:12px;opacity:.4"></i><div>لا نتائج لـ "${q}"</div></div>`;r._f=[];return;}
  let html='',lg='';f.forEach((c,i)=>{if(c.g!==lg){html+=`<div class="cmd-group-title">${c.g}</div>`;lg=c.g;}html+=`<div class="cmd-item ${i===state.cmdIndex?'active':''}" data-i="${CMD.indexOf(c)}" onclick="execCmd(${CMD.indexOf(c)})"><div class="cmd-item-icon"><i class="fas ${c.i}"></i></div><div class="cmd-item-label">${c.l}</div>${c.h?`<div class="cmd-item-hint">${c.h}</div>`:''}</div>`;});
  r.innerHTML=html;r._f=f;
}
function execCmd(i){closeCmd();CMD[i].a();}
$('#cmd-input').addEventListener('input',e=>{state.cmdIndex=0;renderCmd(e.target.value);});
$('#cmd-input').addEventListener('keydown',e=>{const items=$$('#cmd-results .cmd-item');if(e.key==='ArrowDown'){e.preventDefault();state.cmdIndex=Math.min(state.cmdIndex+1,items.length-1);updCmd(items);}else if(e.key==='ArrowUp'){e.preventDefault();state.cmdIndex=Math.max(state.cmdIndex-1,0);updCmd(items);}else if(e.key==='Enter'){const a=items[state.cmdIndex];if(a)a.click();}});
function updCmd(items){items.forEach((it,i)=>it.classList.toggle('active',i===state.cmdIndex));if(items[state.cmdIndex])items[state.cmdIndex].scrollIntoView({block:'nearest'});}
$('#cmd-overlay').addEventListener('click',e=>{if(e.target.id==='cmd-overlay')closeCmd();});

// ---------- القوائم المنسدلة ----------
function toggleDropdown(e,id){e.stopPropagation();const m=$('#'+id);const was=m.classList.contains('show');closeAllDropdowns();if(!was)m.classList.add('show');}
function closeAllDropdowns(){$$('.dropdown-menu').forEach(m=>m.classList.remove('show'));}
document.addEventListener('click',e=>{if(!e.target.closest('.dropdown'))closeAllDropdowns();});

// ---------- الثيم والشريط الجانبي ----------
function toggleTheme(){state.theme=state.theme==='light'?'dark':'light';localStorage.setItem('nexa-theme',state.theme);document.documentElement.setAttribute('data-theme',state.theme);render();}
function toggleSidebar(){if(window.innerWidth<=768){$('.sidebar').classList.toggle('mobile-open');return;}state.sidebarCollapsed=!state.sidebarCollapsed;localStorage.setItem('nexa-sidebar',state.sidebarCollapsed);render();}

// ---------- التوثيق ----------
function handleLogin(e){e.preventDefault();const b=$('#login-btn');b.classList.add('loading');setTimeout(()=>{b.classList.remove('loading');showToast('مرحباً بعودتك، أحمد!','success');setTimeout(()=>navigate('dashboard'),500);},1200);}

// ---------- الشريط الجانبي والترويسة ----------
function renderSidebar(){
  const nav=[
    {s:'الرئيسية',items:[{id:'dashboard',i:'fa-house',l:'لوحة التحكم'},{id:'analytics',i:'fa-chart-line',l:'التحليلات'},{group:'commerce',i:'fa-store',l:'التجارة',children:[{id:'products',l:'المنتجات'},{id:'orders',l:'الطلبات',b:'5'},{id:'invoices',l:'الفواتير'},{id:'customers',l:'العملاء'}]},{id:'kanban',i:'fa-table-columns',l:'لوحة المشاريع',b:'جديد',bc:'accent'}]},
    {s:'مساحة العمل',items:[{id:'calendar',i:'fa-calendar',l:'التقويم'},{id:'messages',i:'fa-comment-dots',l:'الرسائل',b:'3',bc:'rose'},{id:'notifications',i:'fa-bell',l:'الإشعارات'},{id:'file-manager',i:'fa-folder',l:'الملفات'}]},
    {s:'المؤسسة',items:[{id:'users',i:'fa-users',l:'المستخدمون'},{id:'team',i:'fa-user-group',l:'الفريق'},{id:'pricing',i:'fa-credit-card',l:'الأسعار'}]},
    {s:'الحساب',items:[{id:'profile',i:'fa-user',l:'الملف الشخصي'},{id:'settings',i:'fa-gear',l:'الإعدادات'},{id:'help-center',i:'fa-circle-question',l:'المساعدة'}]}
  ];
  const ri=item=>{
    if(item.group){const open=item.children.some(c=>c.id===state.currentPage);return `<div class="nav-group ${open?'open':''}"><button class="nav-item" onclick="this.parentElement.classList.toggle('open')"><i class="fas ${item.i} nav-icon"></i><span class="nav-label">${item.l}</span><i class="fas fa-chevron-left nav-caret"></i></button><div class="nav-submenu">${item.children.map(c=>`<button class="nav-item ${state.currentPage===c.id?'active':''}" onclick="navigate('${c.id}')"><span class="nav-label">${c.l}</span>${c.b?`<span class="nav-badge ${c.bc||''}">${c.b}</span>`:''}</button>`).join('')}</div></div>`;}
    return `<button class="nav-item ${state.currentPage===item.id?'active':''}" onclick="navigate('${item.id}')"><i class="fas ${item.i} nav-icon"></i><span class="nav-label">${item.l}</span>${item.b?`<span class="nav-badge ${item.bc||''}">${item.b}</span>`:''}</button>`;
  };
  return `<aside class="sidebar"><div class="sidebar-header"><div class="sidebar-logo">ن</div><div class="sidebar-title">نكسا أدمن</div></div><nav class="sidebar-nav" aria-label="التنقل الرئيسي">${nav.map(s=>`<div class="nav-section"><div class="nav-section-title">${s.s}</div>${s.items.map(ri).join('')}</div>`).join('')}</nav><div class="sidebar-footer"><div class="upgrade-card"><div class="upgrade-card-title">✨ رقِّ إلى الاحترافية</div><div class="upgrade-card-desc">افتح رؤى الذكاء الاصطناعي وتقارير غير محدودة</div><button class="upgrade-card-btn" onclick="navigate('pricing')">رقِّ الآن</button></div><div class="sidebar-user" onclick="navigate('profile')"><div class="user-avatar">${state.user.initials}</div><div class="user-info"><div class="user-name">${state.user.name}</div><div class="user-email">${state.user.email}</div></div></div></div></aside>`;
}
function renderHeader(){
  const uc=notifData.filter(n=>n.unread).length;
  return `<header class="header"><button class="header-toggle" onclick="toggleSidebar()" aria-label="تبديل الشريط"><i class="fas fa-bars"></i></button><div class="header-search"><button class="search-trigger" onclick="openCmd()"><i class="fas fa-search"></i><span>ابحث أو انتقل إلى...</span><kbd>Ctrl K</kbd></button></div><div class="header-actions"><button class="icon-btn" onclick="toggleTheme()" aria-label="تبديل الثيم" data-tooltip="تبديل الثيم"><i class="fas ${state.theme==='dark'?'fa-sun':'fa-moon'}"></i></button><div class="dropdown"><button class="icon-btn" onclick="toggleDropdown(event,'notif-menu')" aria-label="الإشعارات"><i class="fas fa-bell"></i>${uc>0?`<span class="dot">${uc}</span>`:''}</button><div class="dropdown-menu notif-dropdown" id="notif-menu"><div class="notif-dropdown-header"><span class="font-semibold text-sm">الإشعارات</span><button class="link-btn" onclick="markAllRead()">تعليم الكل كمقروء</button></div><div class="notif-list">${notifData.map(n=>`<div class="notif-item ${n.unread?'unread':''}" onclick="navigate('notifications')"><div class="toast-icon ${n.type}" style="flex-shrink:0"><i class="fas ${n.icon}"></i></div><div style="flex:1"><div class="font-semibold text-xs">${n.title}</div><div class="text-xs text-muted mt-2">${n.desc}</div><div class="text-xs text-muted mt-2">${n.time}</div></div></div>`).join('')}</div><div style="padding:10px;text-align:center"><button class="link-btn" onclick="navigate('notifications')">عرض كل الإشعارات</button></div></div></div><button class="icon-btn" onclick="navigate('messages')" aria-label="الرسائل" data-tooltip="الرسائل"><i class="fas fa-envelope"></i></button><div class="dropdown"><button class="header-avatar" onclick="toggleDropdown(event,'profile-menu')" aria-label="قائمة الملف">${state.user.initials}</button><div class="dropdown-menu" id="profile-menu"><div style="padding:12px;border-block-end:1px solid var(--border)"><div class="font-semibold text-sm">${state.user.name}</div><div class="text-xs text-muted">${state.user.email}</div></div><button class="dropdown-item" onclick="navigate('profile')"><i class="fas fa-user"></i> ملفي الشخصي</button><button class="dropdown-item" onclick="navigate('settings')"><i class="fas fa-gear"></i> الإعدادات</button><button class="dropdown-item" onclick="navigate('pricing')"><i class="fas fa-credit-card"></i> الفوترة</button><button class="dropdown-item" onclick="navigate('help-center')"><i class="fas fa-circle-question"></i> المساعدة</button><div class="dropdown-divider"></div><button class="dropdown-item danger" onclick="navigate('login')"><i class="fas fa-right-from-bracket"></i> تسجيل الخروج</button></div></div></div></header>`;
}
function renderFooter(){return `<footer class="app-footer"><div>© 2026 نكسا أدمن. صُنع بـ <i class="fas fa-heart" style="color:var(--rose)"></i> للفرق الحديثة.</div><div class="footer-links"><a href="#help-center">التوثيق</a><a href="#pricing">الأسعار</a><a href="#help-center">الدعم</a><a href="#settings">الخصوصية</a></div></footer>`;}

// ---------- الهيكل ----------
function renderSkeleton(){return `<div class="skeleton" style="height:30px;width:200px;margin-bottom:8px"></div><div class="skeleton" style="height:15px;width:320px;margin-bottom:26px"></div><div class="stats-grid">${[1,2,3,4].map(()=>`<div class="skeleton" style="height:116px"></div>`).join('')}</div><div class="grid-2"><div class="skeleton" style="height:330px"></div><div class="skeleton" style="height:330px"></div></div>`;}

// ---------- التوجيه والعرض ----------
function navigate(p){state.currentPage=p;location.hash='#'+p;closeAllDropdowns();render();window.scrollTo(0,0);}
const getRoute=()=>location.hash.replace('#','')||'dashboard';

function startLoad(){$('#topbar').classList.add('loading');$('#topbar').classList.remove('done');}
function finishLoad(){const t=$('#topbar');t.classList.remove('loading');t.classList.add('done');setTimeout(()=>{t.classList.remove('done');},350);}

function render(){
  const route=getRoute();state.currentPage=route;
  const standalone=['login','404','401','403','500'];
  startLoad();
  if(standalone.includes(route)){
    if(state.liveTimer){clearInterval(state.liveTimer);state.liveMode=false;}
    $('#app').innerHTML=route==='login'?loginPage():(pages[route]?pages[route]():pages['404']());
    destroyCharts();finishLoad();return;
  }
  $('#app').innerHTML=`<div class="app ${state.sidebarCollapsed?'sidebar-collapsed':''}">${renderSidebar()}<div class="main">${renderHeader()}<div class="content" id="page-content">${renderSkeleton()}</div>${renderFooter()}</div></div>`;
  setTimeout(()=>{
    const c=$('#page-content');if(!c){finishLoad();return;}
    c.innerHTML=pages[route]?pages[route]():pages['404']();
    destroyCharts();buildTables(route);initCharts(route);
    if(route==='notifications')renderNotifList();
    if(route==='settings')showSettingsTab('profile',$('[data-tab="profile"]'));
    animateCounters();animateProgress();
    $$('.btn-primary,.btn-secondary').forEach(b=>b.addEventListener('click',createRipple));
    // تأثير الظهور المتدرّج
    $$('.stat-card,.card,.pricing-card,.kanban-column,.file-card,.product-card').forEach((el,i)=>{el.style.animationDelay=Math.min(i,14)*45+'ms';el.classList.add('reveal');});
    finishLoad();
  },300);
}

function loginPage(){return `<div class="auth-page"><div class="auth-visual"><div class="auth-brand"><div class="brand-mark">ن</div><span>نكسا أدمن</span></div><div class="auth-quote"><blockquote>"حوّلت نكسا أدمن طريقة إدارتنا لأعمالنا بالكامل. الرؤى لا تُقدّر بثمن."</blockquote><cite>— ماركس ويب، الرئيس التنفيذي في Lumen Labs</cite></div><div class="auth-stats"><div><div class="auth-stat-num">+50 ألف</div><div class="auth-stat-label">مستخدم نشط</div></div><div><div class="auth-stat-num">99.9%</div><div class="auth-stat-label">وقت التشغيل</div></div><div><div class="auth-stat-num">4.9★</div><div class="auth-stat-label">التقييم</div></div></div></div><div class="auth-form-wrap"><div class="auth-form"><h1>مرحباً بعودتك</h1><p class="subtitle">أدخل بياناتك للوصول إلى حسابك</p><div class="social-login"><button class="social-btn" onclick="showToast('محاكاة دخول Google','info')"><i class="fab fa-google"></i> Google</button><button class="social-btn" onclick="showToast('محاكاة دخول GitHub','info')"><i class="fab fa-github"></i> GitHub</button></div><div class="divider">أو المتابعة بالبريد</div><form onsubmit="handleLogin(event)"><div class="form-group"><label class="form-label">البريد الإلكتروني</label><input type="email" class="form-input" value="ahmad@nexa.sa" required/></div><div class="form-group"><label class="form-label">كلمة المرور</label><input type="password" class="form-input" value="password" required/></div><div class="form-row"><label class="checkbox-wrap"><input type="checkbox" checked/> تذكّرني</label><button type="button" class="link-btn">نسيت كلمة المرور؟</button></div><button type="submit" class="btn-primary" id="login-btn"><span class="btn-text">تسجيل الدخول</span><span class="spinner"></span></button></form><div class="auth-footer">ليس لديك حساب؟ <button class="link-btn" onclick="showToast('تدفق التسجيل','info')">إنشاء حساب</button></div></div></div></div>`;}

// ---------- اختصارات لوحة المفاتيح ----------
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openCmd();}
  if(e.key==='Escape'){closeCmd();$$('.modal-overlay').forEach(m=>m.remove());$$('.drawer-overlay,.drawer').forEach(d=>d.remove());$('#ai-panel').classList.remove('show');}
});

// ---------- التهيئة ----------
window.addEventListener('hashchange',render);
window.addEventListener('load',()=>{applyAccent(state.accent);if(!location.hash)location.hash='#dashboard';render();});
</script>
